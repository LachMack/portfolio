name: Mirror from Hugging Face Space to GitHub

on:
  workflow_dispatch:            # run it manually
  schedule:
    - cron: "*/30 * * * *"      # or comment-out to disable the timer

permissions:
  contents: write               # allow pushes
  actions:  write               # allow pushing workflow files

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
    # 1 ▸ Check out the current GitHub repo (full history)
    - uses: actions/checkout@v4
      with: { fetch-depth: 0 }

    # 2 ▸ Set an identity for any commits we create
    - name: Configure git identity
      run: |
        git config --global user.email "sync-bot@users.noreply.github.com"
        git config --global user.name  "HF Sync Bot"

    # 3 ▸ Stash the existing assets/ dir *and* this workflow file
    - name: Save assets/ and workflow
      run: |
        if [ -d assets ]; then
          echo "Saving assets/"
          mv assets /tmp/__saved_assets
        fi
        if [ -f .github/workflows/hf-mirror.yml ]; then
          echo "Saving current workflow"
          mkdir -p /tmp/__saved_workflow
          cp .github/workflows/hf-mirror.yml /tmp/__saved_workflow/
        fi

    # 4 ▸ Add the Hugging Face Space as a remote & fetch
    - name: Fetch Hugging Face repo
      run: |
        git remote add hf https://huggingface.co/spaces/lachlanmack/portfolio || true
        git fetch hf main

    # 5 ▸ Reset GitHub's main to exactly hf/main
    - name: Hard-reset to hf/main
      run: git checkout -B main hf/main

    # 6 ▸ Restore the saved assets/ directory
    - name: Restore assets/
      run: |
        if [ -d /tmp/__saved_assets ]; then
          echo "Restoring assets/"
          rm -rf assets
          mv /tmp/__saved_assets assets
          git add assets
        fi

    # 7 ▸ Restore the GitHub workflow file
    - name: Restore mirror workflow
      run: |
        if [ -f /tmp/__saved_workflow/hf-mirror.yml ]; then
          echo "Restoring hf-mirror.yml"
          mkdir -p .github/workflows
          cp /tmp/__saved_workflow/hf-mirror.yml .github/workflows/hf-mirror.yml
          git add .github/workflows/hf-mirror.yml
        fi

    # 8 ▸ Commit only if anything changed (quiet exit code means no diff)
    - name: Commit preserved items (if needed)
      run: |
        if ! git diff --cached --quiet; then
          git commit -m "Preserve assets/ & workflow during HF mirror"
        else
          echo "No changes in preserved items"
        fi

    # 9 ▸ Push the mirror back to GitHub
    - name: Push mirror to GitHub
      run: git push --force origin main
